<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <span class="material-icons-round">play_circle</span>
                <h1>OTT Admin</h1>
            </div>
            <p class="login-subtitle">Sign in to manage your platform</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="admin@ott.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    Sign In
                </button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="material-icons-round">play_circle</span>
                <h2>OTT Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="material-icons-round">dashboard</span>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="videos">
                    <span class="material-icons-round">movie</span>
                    <span>Videos</span>
                </a>
                <a href="#" class="nav-item" data-page="categories">
                    <span class="material-icons-round">category</span>
                    <span>Categories</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <span class="material-icons-round">people</span>
                    <span>Users</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-ghost btn-full" id="logout-btn">
                    <span class="material-icons-round">logout</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2 id="page-title">Dashboard</h2>
                <div class="topbar-actions">
                    <span id="admin-name" class="admin-name">Admin</span>
                </div>
            </header>

            <div id="page-content" class="page-content">
                <!-- Pages dynamically rendered here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="btn-icon" id="modal-close">
                    <span class="material-icons-round">close</span>
                </button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic modal content -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/videos.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/users.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
